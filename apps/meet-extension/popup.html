<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapBack</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 300px;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f6fbf8, #edf3f2);
        color: #10212f;
      }
      .hero {
        padding: 16px;
        border-radius: 20px;
        background: linear-gradient(145deg, #10212f, #1f3850);
        color: white;
      }
      .hero p {
        margin: 6px 0 0;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.76);
      }
      .status {
        margin: 14px 0;
        font-size: 12px;
        color: #51606c;
        line-height: 1.6;
      }
      button {
        width: 100%;
        margin-top: 8px;
        border: none;
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .primary { background: #2e8b57; color: white; }
      .secondary { background: #10212f; color: white; }
      .ghost { background: #e6efec; color: #10212f; }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>SnapBack</h1>
      <p>Google Meet catch-up and tab audio relay</p>
    </div>
    <p class="status" id="status">Session inactive</p>
    <button class="primary" id="open-sidepanel">Open Meet Panel</button>
    <button class="secondary" id="quick-recap">Quick Catch Me Up</button>
    <button class="ghost" id="toggle-capture">Start Tab Audio</button>
    <script type="module" src="popup.js"></script>
  </body>
</html>
