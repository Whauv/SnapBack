<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LectureLens</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 300px;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f6fbf8, #edf3f2);
        color: #10212f;
      }
      button {
        width: 100%;
        margin-top: 8px;
        border: none;
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .primary { background: #2e8b57; color: white; }
      .secondary { background: #10212f; color: white; }
      .status { font-size: 12px; color: #51606c; }
    </style>
  </head>
  <body>
    <h1>LectureLens</h1>
    <p class="status" id="status">Session inactive</p>
    <button class="primary" id="open-sidepanel">Open Meet Panel</button>
    <button class="secondary" id="quick-recap">Quick Catch Me Up</button>
    <script src="popup.js"></script>
  </body>
</html>
